[workspace]
# TODO: Update these fields for your lab/project
authors = ["Your Name <your.email@university.edu>"]
channels = ["conda-forge"]
description = "Scientific lab website built with Quarto"
name = "my-lab-website"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[tasks]
preview = { cmd = ["quarto", "preview", "index.qmd"] }
render = { cmd = ["quarto", "render"] }
clean = { cmd = "python _helper/cleanup.py && python -c \"import shutil; shutil.rmtree('public', ignore_errors=True)\"" }

[dependencies]
quarto = ">=1.5.57,<2"
jupyter = ">=1.1.1,<2"
dart-sass = ">=1.98.0,<2"
