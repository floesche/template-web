project:
  type: website
  output-dir: public
  pre-render:
    - 'python -c "import pathlib; [p.unlink() for p in pathlib.Path(''.'').rglob(''*'') if p.suffix in {''.aux'',''.log'',''.tex'',''.out'',''.typ''} and ''.pixi'' not in p.parts and ''.git'' not in p.parts and ''_helper'' not in p.parts]"'
  preview:
    port: 8000

execute:
  freeze: auto

filters:
  - _helper/git-version.lua

website:
  title: "Thornton Lab"
  site-url: https://yourusername.github.io/your-repo-name/
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: research/index.qmd
        text: Research
      - href: publications.qmd
        text: Publications
      - href: team.qmd
        text: Team
      - href: showcase/index.qmd
        text: Showcase
    right:
      - icon: github
        # TODO: Update with your repository URL
        href: https://github.com/yourusername/your-repo-name
  sidebar:
    - id: research
      title: "Research"
      contents:
        - href: research/index.qmd
          text: Overview
        - text: "---"
        - section: "ConnectTrack"
          contents:
            - text: "Design"
              href: research/project-alpha/design.qmd
            - text: "Methods"
              href: research/project-alpha/methods.qmd
        - section: "SynaptogenEM"
          contents:
            - text: "Overview"
              href: research/project-beta/overview.qmd
    - id: showcase
