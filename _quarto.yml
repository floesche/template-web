  page-footer:
    center: |
      This is a template website: all persons, institutions, and projects are fictitious, and any resemblance to actual persons or entities is entirely coincidental.

format:
  html:
    theme: yeti
    toc: true
    code-fold: true
    link-external-icon: true
    link-external-newwindow: false
    embed-resources: false
    format-links:
      - format: typst
        text: PDF
        icon: file-pdf
      - docx
      - format: gfm
        text: Markdown (gfm)
        icon: markdown
  typst:
    section-numbering: "1.1.1.1"
    papersize: us-letter
    fontsize: 10pt
    margin:
      x: 1in
      y: 1in
    columns: 2
    template-partials:
      - _helper/typst-template.typ
      - _helper/typst-show.typ
      - _helper/biblio.typ
    filters:
      - _helper/detect-citations.lua
      - _helper/video-placeholder.lua
    include-before-body:
      - _helper/figure-span.typ
      - _helper/inline-code-wrap.typ
  docx: default
  gfm: default
