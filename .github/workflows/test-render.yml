name: Test render

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.66.0

      - name: Cache Quarto freeze
        uses: actions/cache@v5
        with:
          path: _freeze
          key: quarto-freeze-${{ matrix.os }}-${{ hashFiles('**/*.qmd') }}
          restore-keys: quarto-freeze-${{ matrix.os }}-

      - name: Render site
        timeout-minutes: 30
        run: pixi run render

      - name: Verify output exists
        shell: bash
        run: |
          test -d public || { echo "::error::public/ directory not found"; exit 1; }
          test -f public/index.html || { echo "::error::public/index.html not found"; exit 1; }
